<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulador de Crédito Corporativo - Análisis de capacidad crediticia y riesgo financiero">
    <title>Simulador de Crédito | Banca Corporativa</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>

    <main class="container">

        <!-- THEME TOGGLE BUTTON -->
        <!-- THEME TOGGLE CONTAINER -->
        <div class="theme-toggle-wrapper">
            <span class="theme-toggle-label" aria-hidden="true">CAMBIAR TEMA AQUÍ</span>
            <button id="btn-theme-toggle" class="theme-toggle-btn" type="button" aria-label="Cambiar tema" title="Alternar modo claro/oscuro">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>

        <!-- HEADER CON IDENTIDAD CORPORATIVA -->
        <header>
            <div class="brand-header">
                <!-- Logo SVG Inline (Optimizado y accesible) -->
                <svg class="bank-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Logo NovaBank Corp" role="img">
                    <path d="M4 40H44V44H4V40Z" fill="currentColor"/>
                    <path d="M6 38H14V14H6V38Z" fill="currentColor"/>
                    <path d="M17 38H25V8H17V38Z" fill="currentColor"/>
                    <path d="M28 38H36V14H28V38Z" fill="currentColor"/>
                    <path d="M39 38H42V22H39V38Z" fill="currentColor"/>
                </svg>
                <div>
                    <h1>Simulador de Crédito</h1>
                    <p>Análisis de capacidad crediticia y riesgo financiero</p>
                </div>
            </div>
        </header>

        <!-- FORMULARIO DE SIMULACIÓN -->
        <form id="formSimulador" onsubmit="return false;" aria-label="Formulario de simulación crediticia">
            <div class="formulario-grid">
                <!-- Ingresos -->
                <div class="campo">
                    <label for="txtIngresos">Ingresos Mensuales (USD):</label>
                    <input type="number" id="txtIngresos" placeholder="Ej: 2500" min="460" max="50000" step="0.01" autocomplete="off">
                    <span class="hint-text">Rango: $460 - $50,000</span>
                    <span id="errIngresos" class="msg-error" aria-live="polite"></span>
                </div>

                <div class="campo">
                    <label for="txtArriendo">Gastos Arriendo (USD):</label>
                    <input type="number" id="txtArriendo" placeholder="Ej: 400" min="0" step="0.01" autocomplete="off">
                    <span id="errArriendo" class="msg-error" aria-live="polite"></span>
                </div>

                <div class="campo">
                    <label for="txtAlimentacion">Gastos Alimentación (USD):</label>
                    <input type="number" id="txtAlimentacion" placeholder="Ej: 300" min="0" step="0.01" autocomplete="off">
                    <span id="errAlimentacion" class="msg-error" aria-live="polite"></span>
                </div>

                <div class="campo">
                    <label for="txtVarios">Gastos Varios (USD):</label>
                    <input type="number" id="txtVarios" placeholder="Ej: 100" min="0" step="0.01" autocomplete="off">
                    <span id="errVarios" class="msg-error" aria-live="polite"></span>
                </div>

                <!-- Monto Solicitado -->
                <div class="campo">
                    <label for="txtMonto">Monto Solicitado (USD):</label>
                    <input type="number" id="txtMonto" placeholder="Ej: 15000" min="500" max="100000" step="0.01" autocomplete="off">
                    <span class="hint-text">Rango: $500 - $100,000</span>
                    <span id="errMonto" class="msg-error" aria-live="polite"></span>
                </div>

                <!-- Plazo -->
                <div class="campo">
                    <label for="txtPlazo">Plazo del Crédito (Años):</label>
                    <input type="number" id="txtPlazo" placeholder="Ej: 5" min="1" max="40" step="1" autocomplete="off">
                    <span class="hint-text">Rango: 1 - 40 años</span>
                    <span id="errPlazo" class="msg-error" aria-live="polite"></span>
                </div>

                <!-- Tasa de Interés -->
                <div class="campo">
                    <label for="txtTasaInteres">Tasa de Interés Anual (%):</label>
                    <input type="number" id="txtTasaInteres" placeholder="Ej: 12.5" min="1" max="100" step="0.01" autocomplete="off">
                    <span class="hint-text">Rango: 1% - 100%</span>
                    <span id="errTasa" class="msg-error" aria-live="polite"></span>
                </div>
            </div>

            <!-- BOTONES DE ACCIÓN -->
            <div class="acciones">
                <button type="button" class="btn-calcular" onclick="calcular()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
                    Calcular Crédito
                </button>
                <button type="button" class="btn-limpiar" onclick="limpiar()">Limpiar Formulario</button>
            </div>
        </form>

        <!-- SECCIÓN DE RESULTADOS -->
        <section class="resultados-section" aria-label="Resultados de la simulación">

            <div class="resultado-item">Total Gastos: <span id="IblTotalGastos">0.00</span></div>

            <div class="resultado-item">Disponible: <span id="IblDisponibleValor">0.00</span></div>
            <div class="resultado-item">Capacidad Pago: <span id="IblCapacidadValor">0.00</span></div>
            <div class="resultado-item">Interés: <span id="IblinteresValor">0.00</span></div>
            <div class="resultado-item">Total a Pagar: <span id="IblTotalValor">0.00</span></div>
            <div class="resultado-item">Cuota Mensual: <span id="IblCuotaValor">0.00</span></div>
        </section>

        <!-- ESTADO DE APROBACIÓN -->
        <div id="IblEstadoCredito" aria-live="assertive"></div>
    </main>

    <!-- SCRIPTS DE LÓGICA -->
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</body>
</html>
