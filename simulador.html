<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito | Banca Corporativa</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Simulador de Crédito</h1>
            <p>Análisis de capacidad crediticia y riesgo financiero</p>
        </header>

        <main>
            <div class="formulario-grid">
                
                <div class="campo">
                    <label for="txtIngresos">Ingresos Mensuales (USD):</label>
                    <input type="number" id="txtIngresos" placeholder="Ej: 1200" 
                           oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5); if(this.value < 0) this.value = 0;">
                    <small id="hintIngresos" class="hint-text">Rango: $460 - $50,000</small>
                    <span id="errIngresos" class="msg-error"></span>
                </div>

                <div class="campo">
                    <label for="txtEgresos">Egresos Mensuales (USD):</label>
                    <input type="number" id="txtEgresos" placeholder="Ej: 600" 
                           oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5); if(this.value < 0) this.value = 0;">
                    <small id="hintEgresos" class="hint-text">No debe superar sus ingresos</small>
                    <span id="errEgresos" class="msg-error"></span>
                </div>

                <div class="campo">
                    <label for="txtMonto">Monto Solicitado (USD):</label>
                    <input type="number" id="txtMonto" placeholder="Ej: 5000" 
                           oninput="if(this.value.length > 6) this.value = this.value.slice(0, 6); if(this.value < 0) this.value = 0;">
                    <small id="hintMonto" class="hint-text">Rango: $500 - $100,000</small>
                    <span id="errMonto" class="msg-error"></span>
                </div>

                <div class="campo">
                    <label for="txtPlazo">Plazo del Crédito (Años):</label>
                    <input type="number" id="txtPlazo" placeholder="Ej: 5" 
                           oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2); if(this.value < 1 && this.value !== '') this.value = 1;">
                    <small id="hintPlazo" class="hint-text">Rango: 1 - 40 años</small>
                    <span id="errPlazo" class="msg-error"></span>
                </div>

                <div class="campo">
                    <label for="txtTasaInteres">Tasa de Interés Anual (%):</label>
                    <input type="number" id="txtTasaInteres" placeholder="Ej: 12" 
                           oninput="if(this.value.length > 3) this.value = this.value.slice(0, 3); if(this.value < 0) this.value = 0;">
                    <small id="hintTasa" class="hint-text">Rango: 1% - 100%</small>
                    <span id="errTasa" class="msg-error"></span>
                </div>
            </div>

            <div class="acciones">
                <button class="btn-calcular" onclick="calcular()">Calcular Crédito</button>
                <button class="btn-limpiar" onclick="limpiar()">Limpiar Formulario</button>
            </div>

            <div class="resultados-section">
                <div class="resultado-item">
                    Disponible:
                    <span id="IblDisponibleValor">0.00</span>
                </div>
                <div class="resultado-item">
                    Capacidad Pago:
                    <span id="IblCapacidadValor">0.00</span>
                </div>
                <div class="resultado-item">
                    Interés:
                    <span id="IblinteresValor">0.00</span>
                </div>
                <div class="resultado-item">
                    Total a Pagar:
                    <span id="IblTotalValor">0.00</span>
                </div>
                <div class="resultado-item">
                    Cuota Mensual:
                    <span id="IblCuotaValor">0.00</span>
                </div>
            </div>

            <div id="IblEstadoCredito">
                </div>
        </main>
    </div>

</body>
</html>
